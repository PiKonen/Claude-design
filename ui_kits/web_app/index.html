<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lumen — Web app UI kit</title>
<link rel="stylesheet" href="app.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="ProjectCard.jsx"></script>
<script type="text/babel" src="Views.jsx"></script>

<script type="text/babel">
const { useState } = React;

const App = () => {
  const [view, setView] = useState('home');
  const [project, setProject] = useState(null);

  const openProject = (p) => { setProject(p); setView('editor'); };
  const nav = (v) => { setProject(null); setView(v); };

  const titles = {
    home: { title: "Home", crumbs: "Morning Studio" },
    projects: { title: "Projects", crumbs: "Morning Studio" },
    favorites: { title: "Favorites", crumbs: "Morning Studio" },
    library: { title: "Library", crumbs: "Morning Studio" },
    trash: { title: "Trash", crumbs: "Morning Studio" },
    members: { title: "Members", crumbs: "Morning Studio · Workspace" },
    brand: { title: "Brand kit", crumbs: "Morning Studio · Workspace" },
    settings: { title: "Settings", crumbs: "Morning Studio · Workspace" },
    editor: { title: project?.name || "Project", crumbs: "Projects" },
  };
  const t = titles[view];

  return (
    <div className="app-shell" data-screen-label={view}>
      <Sidebar activeView={view} onNav={nav} />
      <main>
        <Topbar title={t.title} crumbs={t.crumbs} onNew={view !== 'editor' ? () => openProject({ name: "Untitled" }) : undefined} />
        {view === 'home' && <HomeView onOpenProject={openProject} />}
        {view === 'projects' && <ProjectsView onOpenProject={openProject} />}
        {view === 'settings' && <SettingsView />}
        {view === 'editor' && <EditorView project={project} onBack={() => nav('projects')} />}
        {['favorites','library','trash','members','brand'].includes(view) && (
          <div className="content">
            <div className="page-title">{t.title}</div>
            <div className="page-subtitle">This surface is intentionally left blank in the UI kit — swap in the matching view when implementing.</div>
          </div>
        )}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
