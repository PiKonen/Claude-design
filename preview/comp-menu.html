<!doctype html>
<html><head><meta charset="utf-8"><title>Menu</title>
<link rel="stylesheet" href="_card.css">
</head>
<body class="card"><div class="card-surface" style="background:#FBF8F3;">
  <div style="display:flex;gap:16px;">
    <!-- menu -->
    <div style="background:#fff;border-radius:14px;padding:6px;box-shadow:0 12px 24px -6px rgba(74,47,15,0.10), 0 4px 8px -4px rgba(74,47,15,0.05);border:1px solid #EBE4D6;width:240px;">
      <div style="padding:8px 12px;font-size:12px;color:#8E846F;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;">Workspace</div>
      <div style="padding:8px 10px;border-radius:8px;font-size:13px;color:#1B1814;display:flex;justify-content:space-between;align-items:center;background:#FAF0DC;">Settings<span style="color:#8E846F;font-size:11px;" class="mono">⌘,</span></div>
      <div style="padding:8px 10px;border-radius:8px;font-size:13px;color:#2F2A23;display:flex;justify-content:space-between;">Members<span style="color:#8E846F;font-size:11px;" class="mono">⌘M</span></div>
      <div style="padding:8px 10px;border-radius:8px;font-size:13px;color:#2F2A23;">Billing</div>
      <div style="height:1px;background:#EBE4D6;margin:6px 8px;"></div>
      <div style="padding:8px 10px;border-radius:8px;font-size:13px;color:#8A3A1E;">Sign out</div>
    </div>
    <!-- tooltip -->
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start;padding-top:32px;">
      <div style="background:#1B1814;color:#FBF8F3;font-size:12px;padding:6px 10px;border-radius:8px;font-weight:500;">
        Open in new window
        <div style="margin-top:2px;color:#8E846F;font-size:10px;" class="mono">⌘ ⇧ N</div>
      </div>
      <span class="caption">Tooltip</span>
    </div>
  </div>
  <span class="caption">Menu + tooltip · warm shadow · 8/14 radii</span>
</div></body></html>
