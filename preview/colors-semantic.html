<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card"><div class="card-surface">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 10px;">
    <!-- success -->
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:#EAF1E3;border:1px solid #A6BC97;color:#3B5134;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;">Saved</div>
      <span style="font-size:11px;color:var(--fg-3);letter-spacing:0.04em;text-transform:uppercase;">Success</span>
    </div>
    <!-- warning -->
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:#FBEECB;border:1px solid #E5B058;color:#7A5410;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;">Review</div>
      <span style="font-size:11px;color:var(--fg-3);letter-spacing:0.04em;text-transform:uppercase;">Warning</span>
    </div>
    <!-- danger -->
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:#F7E3DA;border:1px solid #D99375;color:#8A3A1E;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;">Failed</div>
      <span style="font-size:11px;color:var(--fg-3);letter-spacing:0.04em;text-transform:uppercase;">Danger</span>
    </div>
    <!-- info -->
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:#E3EDF3;border:1px solid #8FB2C2;color:#2F5668;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;">Syncing</div>
      <span style="font-size:11px;color:var(--fg-3);letter-spacing:0.04em;text-transform:uppercase;">Info</span>
    </div>
  </div>
  <span class="caption" style="color:var(--fg-3);">bg · border · fg triads — never use for decoration</span>
</div></body></html>
