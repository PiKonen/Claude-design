<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card"><div class="card-surface">
  <div class="grid" style="grid-template-columns: repeat(10, 1fr); gap: 6px;">
    <!-- Brand scale 50..900 — olive green -->
    <div style="background:#F8F8EF;aspect-ratio:1;border-radius:10px;border:1px solid rgba(0,0,0,0.04);"></div>
    <div style="background:#EEEED6;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#DADDA8;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#BFC57A;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#A0A856;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#808A3E;aspect-ratio:1;border-radius:10px;outline:2px solid rgba(60,70,25,0.15);outline-offset:2px;"></div>
    <div style="background:#636C2E;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#4B5323;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#363C1A;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#242812;aspect-ratio:1;border-radius:10px;"></div>
  </div>
  <div class="row" style="justify-content:space-between;">
    <div class="col" style="gap:2px;">
      <span class="caption">Brand · Olive</span>
      <span style="font-size:13px;color:var(--fg-2);">500 — <span class="mono">#808A3E</span></span>
    </div>
    <span style="font-size:11px;color:var(--fg-3);" class="mono">50 → 900</span>
  </div>
</div></body></html>
