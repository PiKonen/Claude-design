<!doctype html>
<html><head><meta charset="utf-8"><title>Avatars & Logos</title>
<link rel="stylesheet" href="_card.css">
</head>
<body class="card"><div class="card-surface">
  <div class="row" style="gap:10px;align-items:center;">
    <img src="../assets/mark-lumen.svg" style="width:56px;height:56px;"/>
    <img src="../assets/logo-lumen.svg" style="height:40px;"/>
  </div>
  <div style="height:1px;background:#EBE4D6;"></div>
  <div class="row" style="gap:8px;align-items:center;">

    <div style="width:36px;height:36px;border-radius:50%;background:#8FB2C2;color:#1F3A47;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;">VR</div>
