<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css">
</head>
<body class="card"><div class="card-surface" style="background:#FBF8F3;">
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px;">
    <!-- project card -->
    <div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(74,47,15,0.06);border:1px solid #EBE4D6;">
      <div style="aspect-ratio:16/9;background:linear-gradient(135deg,#FAF0DC,#EDC985);border-radius:10px;margin-bottom:12px;"></div>
      <div style="font-size:14px;font-weight:600;color:#1B1814;">Morning Moodboard</div>
      <div style="font-size:12px;color:#8E846F;margin-top:2px;">Updated 3 hours ago</div>
    </div>
    <!-- stat card -->
    <div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(74,47,15,0.06);border:1px solid #EBE4D6;display:flex;flex-direction:column;gap:6px;">
      <span style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#8E846F;">Files this week</span>
      <span style="font-family:var(--font-serif);font-style:italic;font-size:44px;line-height:1;color:#1B1814;">128</span>
      <span style="font-size:12px;color:#638356;">▲ 14% from last week</span>
    </div>
  </div>
  <span class="caption">Cards · 16px radius · soft warm shadow · 1px subtle border</span>
</div></body></html>
