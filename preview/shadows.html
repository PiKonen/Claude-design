<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card"><div class="card-surface" style="background:#FBF8F3;">
  <div class="row" style="gap:20px;padding:12px 4px 24px;">
    <div style="width:84px;height:84px;background:#fff;border-radius:14px;box-shadow:0 1px 2px rgba(74,47,15,0.05);"></div>
    <div style="width:84px;height:84px;background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(74,47,15,0.06), 0 1px 2px rgba(74,47,15,0.04);"></div>
    <div style="width:84px;height:84px;background:#fff;border-radius:14px;box-shadow:0 4px 10px -2px rgba(74,47,15,0.08), 0 2px 4px -2px rgba(74,47,15,0.04);"></div>
    <div style="width:84px;height:84px;background:#fff;border-radius:14px;box-shadow:0 12px 24px -6px rgba(74,47,15,0.10), 0 4px 8px -4px rgba(74,47,15,0.05);"></div>
    <div style="width:84px;height:84px;background:#fff;border-radius:14px;box-shadow:0 24px 48px -12px rgba(74,47,15,0.14), 0 8px 16px -8px rgba(74,47,15,0.06);"></div>
    <div style="width:84px;height:84px;background:#fff;border-radius:14px;box-shadow:0 0 0 4px rgba(216,149,53,0.28);"></div>
  </div>
  <div class="row" style="gap:20px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">
    <span style="width:84px;">xs</span><span style="width:84px;">sm</span><span style="width:84px;">md</span><span style="width:84px;">lg</span><span style="width:84px;">xl</span><span style="width:84px;">glow</span>
  </div>
  <span class="caption">Warm-tinted shadows · rgba(74, 47, 15)</span>
</div></body></html>
