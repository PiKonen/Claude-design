<!doctype html>
<html><head><meta charset="utf-8"><title>Accent Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card"><div class="card-surface">
  <div class="grid" style="grid-template-columns: repeat(10, 1fr); gap: 6px;">
    <div style="background:#F3F6F2;aspect-ratio:1;border-radius:10px;border:1px solid rgba(0,0,0,0.04);"></div>
    <div style="background:#E3EADD;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#C7D5BC;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#A6BC97;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#83A074;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#638356;aspect-ratio:1;border-radius:10px;outline:2px solid rgba(74,47,15,0.15);outline-offset:2px;"></div>
    <div style="background:#4D6843;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#3B5134;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#2B3B26;aspect-ratio:1;border-radius:10px;"></div>
    <div style="background:#1D281A;aspect-ratio:1;border-radius:10px;"></div>
  </div>
  <div class="row" style="justify-content:space-between;">
    <div class="col" style="gap:2px;">
      <span class="caption">Accent · Sage</span>
      <span style="font-size:13px;color:var(--fg-2);">500 — <span class="mono">#638356</span></span>
    </div>
    <span style="font-size:11px;color:var(--fg-3);" class="mono">50 → 900</span>
  </div>
</div></body></html>
