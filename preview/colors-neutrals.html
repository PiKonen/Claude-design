<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card"><div class="card-surface">
  <div class="grid" style="grid-template-columns: repeat(12, 1fr); gap: 5px;">
    <div style="background:#FFFFFF;aspect-ratio:1;border-radius:8px;border:1px solid rgba(0,0,0,0.08);"></div>
    <div style="background:#FBF8F3;aspect-ratio:1;border-radius:8px;border:1px solid rgba(0,0,0,0.04);"></div>

    <div style="background:#EBE4D6;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#D9D0BE;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#B8AD97;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#8E846F;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#665E4F;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#4A4338;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#2F2A23;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#1B1814;aspect-ratio:1;border-radius:8px;"></div>
    <div style="background:#000000;aspect-ratio:1;border-radius:8px;"></div>
  </div>
  <div class="row" style="justify-content:space-between;">
    <div class="col" style="gap:2px;">
      <span class="caption">Neutrals · Warm Cream → Warm Charcoal</span>
      <span style="font-size:13px;color:var(--fg-2);">Slight yellow/red cast throughout — no cool gray.</span>
    </div>
  </div>
