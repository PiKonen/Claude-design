<!doctype html>
<html><head><meta charset="utf-8"><title>Form Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex;flex-direction:column;gap:6px; }
  .label { font-size: 13px; font-weight: 500; color: #2F2A23; }
  .input {
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #D9D0BE;
    background: #FFFFFF;
    color: #1B1814;
    outline: none;
    transition: all 140ms;
  }
  .input:focus { border-color: #D89535; box-shadow: 0 0 0 4px rgba(216,149,53,0.18); }
  .input-error { border-color: #D99375; }
  .hint { font-size: 12px; color: #8E846F; }
  .hint-err { color: #8A3A1E; }
</style>
</head>
<body class="card"><div class="card-surface">
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px;">
    <div class="field">
      <span class="label">Workspace name</span>
      <input class="input" value="Morning Studio"/>
      <span class="hint">Visible to your team.</span>
    </div>
    <div class="field">
      <span class="label">Email</span>
      <input class="input" style="border-color:#D89535;box-shadow:0 0 0 4px rgba(216,149,53,0.18);" value="you@lumen.studio"/>
      <span class="hint">Focused state.</span>
    </div>
    <div class="field">
      <span class="label">Slug</span>
      <input class="input input-error" value="not valid"/>
      <span class="hint hint-err">Letters, numbers, and dashes only.</span>
    </div>
    <div class="field">
      <span class="label">Timezone</span>
      <div class="input" style="display:flex;justify-content:space-between;align-items:center;color:#2F2A23;">Europe · Helsinki <span style="color:#8E846F;">▾</span></div>
    </div>
  </div>
  <span class="caption">Inputs · 10px radius · glow focus ring</span>
</div></body></html>
