<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="_card.css">
<style>
  .badge { font-family: var(--font-sans); font-size:12px; font-weight:500; padding: 4px 10px; border-radius: 9999px; border: 1px solid; display:inline-flex; align-items:center; gap:6px; }
  .dot { width:6px;height:6px;border-radius:3px; }
</style>
</head>
<body class="card"><div class="card-surface">
  <div class="row" style="gap:8px;flex-wrap:wrap;">
    <span class="badge" style="background:#EAF1E3;color:#3B5134;border-color:#A6BC97;"><span class="dot" style="background:#638356;"></span>Saved</span>
    <span class="badge" style="background:#FBEECB;color:#7A5410;border-color:#E5B058;"><span class="dot" style="background:#D89535;"></span>Draft</span>
    <span class="badge" style="background:#F7E3DA;color:#8A3A1E;border-color:#D99375;"><span class="dot" style="background:#8A3A1E;"></span>Failed</span>
    <span class="badge" style="background:#E3EDF3;color:#2F5668;border-color:#8FB2C2;"><span class="dot" style="background:#2F5668;"></span>Syncing</span>
    <span class="badge" style="background:#F5F0E7;color:#4A4338;border-color:#D9D0BE;">Archived</span>
    <span class="badge" style="background:#1B1814;color:#FBF8F3;border-color:#1B1814;">Pro</span>
  </div>
  <div class="row" style="gap:8px;flex-wrap:wrap;">
    <span class="badge" style="background:#FAF0DC;color:#6A4313;border-color:#EDC985;">Illustration</span>
    <span class="badge" style="background:#FAF0DC;color:#6A4313;border-color:#EDC985;">Branding</span>
    <span class="badge" style="background:#F3F6F2;color:#3B5134;border-color:#C7D5BC;">Moodboard</span>
    <span class="badge" style="background:#F3F6F2;color:#3B5134;border-color:#C7D5BC;">Studio</span>
  </div>
  <span class="caption">Badges · pill radius · semantic + category</span>
</div></body></html>
