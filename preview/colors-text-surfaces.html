<!doctype html>
<html><head><meta charset="utf-8"><title>Text + Surfaces</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card"><div class="card-surface">
  <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 16px;">
    <!-- Text tokens -->
    <div class="col" style="gap:8px;">
      <span class="caption">Text</span>
      <div style="font-size:15px;color:#1B1814;">fg-1 — Primary text</div>
      <div style="font-size:15px;color:#4A4338;">fg-2 — Secondary text</div>
      <div style="font-size:15px;color:#8E846F;">fg-3 — Muted text</div>
      <div style="font-size:15px;color:#905B18;text-decoration:underline;text-underline-offset:3px;">fg-link — Linked text</div>
    </div>
    <!-- Surface tokens -->
    <div class="col" style="gap:6px;">
      <span class="caption">Surfaces</span>
      <div style="background:#FBF8F3;padding:8px 12px;border-radius:8px;font-size:13px;border:1px solid #EBE4D6;">surface-bg</div>
      <div style="background:#FFFFFF;padding:8px 12px;border-radius:8px;font-size:13px;border:1px solid #EBE4D6;">surface-card</div>
      <div style="background:#F5F0E7;padding:8px 12px;border-radius:8px;font-size:13px;">surface-sunken</div>
      <div style="background:#1B1814;color:#FBF8F3;padding:8px 12px;border-radius:8px;font-size:13px;">surface-overlay</div>
    </div>
  </div>
</div></body></html>
