  </svg>
);

/* ======================================================================
   HELPERS
   ====================================================================== */
const detectMode = (raw) => {
  const v = raw.trim();
  if (!v) return "empty";
  if (v.includes("@")) return "email";
  if (/^\+/.test(v)) return "phone";
  const digits = v.replace(/[\s\-().]/g, "");
  if (/^\d{2,}$/.test(digits)) return "phone";
  return "typing";
};
const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
const isValidPhone = (v) => {
  const digits = v.replace(/\D/g, "");
  return digits.length >= 6 && digits.length <= 15;
};
const formatPhone = (v) => {
  const digits = v.replace(/\D/g, "").slice(0, 12);
  if (digits.length <= 3) return digits;
  if (digits.length <= 6) return `${digits.slice(0,3)} ${digits.slice(3)}`;
  if (digits.length <= 9) return `${digits.slice(0,3)} ${digits.slice(3,6)} ${digits.slice(6)}`;
  return `${digits.slice(0,3)} ${digits.slice(3,6)} ${digits.slice(6,9)} ${digits.slice(9)}`;
};

/* ======================================================================
   COUNTRY POPOVER
   ====================================================================== */
const CountryPopover = ({ selected, onSelect, onClose }) => {
  const [q, setQ] = useState("");
  const [hl, setHl] = useState(0);
  const popRef = useRef(null);
  const searchRef = useRef(null);

  useEffect(() => { searchRef.current && searchRef.current.focus(); }, []);
  useEffect(() => {
    const onDoc = (e) => { if (popRef.current && !popRef.current.contains(e.target)) onClose(); };
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [onClose]);

  const filtered = useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return COUNTRIES;
    return COUNTRIES.filter(c =>
      c.name.toLowerCase().includes(needle) ||
      c.dial.includes(needle) ||
      c.code.toLowerCase().includes(needle)
    );
  }, [q]);

  return (
    <div className="cc-pop" ref={popRef} role="listbox">
      <div className="cc-search">
        <IconSearch />
        <input
          ref={searchRef}
          placeholder="Search country or code"
          value={q}
          onChange={(e) => { setQ(e.target.value); setHl(0); }}
          onKeyDown={(e) => {
            if (e.key === "ArrowDown") { e.preventDefault(); setHl(h => Math.min(h + 1, filtered.length - 1)); }
            else if (e.key === "ArrowUp") { e.preventDefault(); setHl(h => Math.max(h - 1, 0)); }
            else if (e.key === "Enter") { e.preventDefault(); if (filtered[hl]) onSelect(filtered[hl]); }
          }}
        />
      </div>
      <div className="cc-list">
        {filtered.length === 0 && <div className="hint">No matches.</div>}
        {filtered.map((c, i) => (
          <div
            key={c.code}
            className={`cc-item ${i === hl ? "hl" : ""}`}
            onMouseEnter={() => setHl(i)}
            onClick={() => onSelect(c)}
            role="option"
            aria-selected={selected.code === c.code}
          >
            <span className="flag">{c.flag}</span>
            <span className="name">{c.name}</span>
            <span className="dial">{c.dial}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ======================================================================
   STEP 1: DETAILS
   ====================================================================== */
const DetailsStep = ({ name, setName, value, setValue, country, setCountry, agreed, setAgreed, onSubmit }) => {
  const mode = detectMode(value);
  const [ccOpen, setCcOpen] = useState(false);
  const inputRef = useRef(null);

  const isPhone = mode === "phone";
  const isEmail = mode === "email";
  const contactValid = isEmail ? isValidEmail(value) : isPhone ? isValidPhone(value) : false;
  const nameValid = name.trim().length >= 2;
  const valid = nameValid && contactValid && agreed;

  const handleChange = (e) => {
    let v = e.target.value;
    const m = detectMode(v);
    if (m === "phone" && !v.startsWith("+")) v = formatPhone(v);
    setValue(v);
  };

  const placeholder = isPhone ? "40 123 4567" : "you@studio.com or +358…";

  return (
    <div className="step">
      <div>
        <h1 className="step-title">Create your account</h1>
        <p className="step-sub">
          A name and one way to reach you — that's all we need to get started.
        </p>
      </div>

      <form onSubmit={(e) => { e.preventDefault(); if (valid) onSubmit({ name: name.trim(), mode: isEmail ? "email" : "phone", value: value.trim(), country }); }}>

        <div className="field">
          <label className="label" htmlFor="name">Your name</label>
          <div className="input-shell">
            <input id="name" className="input" type="text" autoComplete="name"
                   placeholder="Alex Morgan" value={name} onChange={(e) => setName(e.target.value)} autoFocus />
          </div>
        </div>

        <div className="field">
          <div className="label-row">
            <label className="label" htmlFor="identifier">Email or phone</label>
            {(isEmail || isPhone) && (
              <span className={`mode-hint mode-${isEmail ? "email" : "phone"}`}>
                {isEmail ? <IconMail /> : <IconPhone />}
                {isEmail ? "Email" : "Phone"}
              </span>
            )}
          </div>
          <div className="input-shell">
            {isPhone && (
              <button type="button" className="cc-btn" onClick={() => setCcOpen(o => !o)} aria-haspopup="listbox" aria-expanded={ccOpen}>
                <span className="flag">{country.flag}</span>
                <span>{country.dial}</span>
                <span className="chev"><IconChev size={12} /></span>
              </button>
            )}
            <input
              id="identifier"
              ref={inputRef}
              className="input"
              type="text"
              inputMode={isPhone ? "tel" : "email"}
              autoComplete={isPhone ? "tel-national" : "email"}
              placeholder={placeholder}
              value={value}
              onChange={handleChange}
            />
            {isPhone && ccOpen && (
              <CountryPopover
                selected={country}
                onSelect={(c) => { setCountry(c); setCcOpen(false); inputRef.current && inputRef.current.focus(); }}
                onClose={() => setCcOpen(false)}
              />
            )}
          </div>
          <span className="hint">
            {isPhone
              ? "We'll text a 6-digit code to confirm it's you."
              : isEmail
              ? "We'll email a 6-digit code to confirm it's you."
              : "Choose however you'd like to be reached — either works."}
          </span>
        </div>

        <label className="remember">
          <input type="checkbox" checked={agreed} onChange={(e) => setAgreed(e.target.checked)} />
          <span className="box"><IconCheck size={12} /></span>
          <span className="rem-label">
            I agree to Lumen's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
          </span>
        </label>

        <button type="submit" className="btn btn-primary" disabled={!valid}>
          Send verification code <IconArrow />
        </button>
      </form>

      <div className="divider-text">or sign up with</div>
      <div className="sso">
        <button className="sso-btn" type="button"><IconGoogle /> Google</button>
        <button className="sso-btn" type="button"><IconApple /> Apple</button>
      </div>
    </div>
  );
};

/* ======================================================================
   STEP 2: VERIFY
   ====================================================================== */
const VerifyStep = ({ identity, onBack, onVerify }) => {
  const [digits, setDigits] = useState(["", "", "", "", "", ""]);
  const [active, setActive] = useState(0);
  const [error, setError] = useState(false);
  const [verifying, setVerifying] = useState(false);
  const [secondsLeft, setSecondsLeft] = useState(32);
  const refs = useRef([]);

  const isPhone = identity.mode === "phone";
  const destination = isPhone ? `${identity.country.dial} ${identity.value}` : identity.value;

  useEffect(() => { refs.current[0] && refs.current[0].focus(); }, []);
  useEffect(() => {
    if (secondsLeft <= 0) return;
    const t = setTimeout(() => setSecondsLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [secondsLeft]);

  const tryVerify = (code) => {
    setVerifying(true);
    setTimeout(() => {
      if (code.length === 6 && /^\d{6}$/.test(code)) onVerify();
      else { setError(true); setVerifying(false); }
    }, 520);
  };

  const update = (idx, val) => {
    const clean = val.replace(/\D/g, "").slice(0, 1);
    const next = [...digits];
    next[idx] = clean;
    setDigits(next);
    setError(false);
    if (clean && idx < 5) { setActive(idx + 1); refs.current[idx + 1] && refs.current[idx + 1].focus(); }
    if (next.every(d => d) && next.join("").length === 6) tryVerify(next.join(""));
  };
  const onKey = (idx, e) => {
    if (e.key === "Backspace" && !digits[idx] && idx > 0) { setActive(idx - 1); refs.current[idx - 1] && refs.current[idx - 1].focus(); }
    else if (e.key === "ArrowLeft" && idx > 0) { setActive(idx - 1); refs.current[idx - 1] && refs.current[idx - 1].focus(); }
    else if (e.key === "ArrowRight" && idx < 5) { setActive(idx + 1); refs.current[idx + 1] && refs.current[idx + 1].focus(); }
  };
  const onPaste = (e) => {
    const pasted = (e.clipboardData.getData("text") || "").replace(/\D/g, "").slice(0, 6);
    if (!pasted) return;
    e.preventDefault();
    const next = pasted.split("");
    while (next.length < 6) next.push("");
    setDigits(next);
    const lastIdx = Math.min(pasted.length, 5);
    setActive(lastIdx); refs.current[lastIdx] && refs.current[lastIdx].focus();
    if (pasted.length === 6) tryVerify(pasted);
  };
  const resend = () => {
    setSecondsLeft(32); setDigits(["","","","","",""]); setActive(0); setError(false);
    refs.current[0] && refs.current[0].focus();
  };

  return (
    <div className="step">
      <button className="back" onClick={onBack} type="button">
        <IconArrow dir="left" /> Edit {isPhone ? "number" : "email"}
      </button>

      <div>
        <h1 className="step-title">{isPhone ? "Confirm your number" : "Confirm your email"}</h1>
        <p className="step-sub">
          We sent a 6-digit PIN to <span className="dest">{destination}</span>.
          {' '}Enter it below to finish creating your account.
        </p>
      </div>

      <div>
        <div className="otp-row" onClick={() => refs.current[active] && refs.current[active].focus()} role="group" aria-label="One-time PIN">
          {digits.map((d, i) => (
            <div key={i} className={`otp-cell ${d ? "filled" : ""} ${active === i && !error ? "active" : ""} ${error ? "error" : ""}`}>
              {d || "–"}
            </div>
          ))}
        </div>
        {digits.map((d, i) => (
          <input
            key={i}
            ref={(el) => refs.current[i] = el}
            className="otp-hidden"
            type="text"
            inputMode="numeric"
            autoComplete={i === 0 ? "one-time-code" : "off"}
            maxLength={1}
            value={d}
            onChange={(e) => update(i, e.target.value)}
            onKeyDown={(e) => onKey(i, e)}
            onFocus={() => setActive(i)}
            onPaste={onPaste}
            aria-label={`Digit ${i + 1}`}
          />
        ))}
        <div>
          {error && <span className="hint hint-err"><IconAlert /> That PIN didn't match. Double-check or request a new one.</span>}
          {verifying && !error && <span className="hint">Verifying…</span>}
        </div>
      </div>

      <div className="resend-row">
        <span>Didn't get it?</span>
        <button type="button" onClick={resend} disabled={secondsLeft > 0}>
          {secondsLeft > 0 ? `Resend in ${secondsLeft}s` : "Resend PIN"}
        </button>
      </div>
    </div>
  );
};

/* ======================================================================
   STEP 3: SUCCESS
   ====================================================================== */
const SuccessStep = ({ identity }) => (
  <div className="step success">
    <div className="success-ring">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>
    <h1 className="step-title">Welcome, {identity.name.split(" ")[0]}.</h1>
    <p className="step-sub">
      Your account is ready. Opening your first studio — a quiet canvas, waiting.
    </p>
    <a href="#" className="btn btn-primary">
      Enter Lumen <IconArrow />
    </a>
  </div>
);

/* ======================================================================
   APP
   ====================================================================== */
const App = () => {
  const [step, setStep] = useState("details");
  const [name, setName] = useState("");
  const [value, setValue] = useState("");
  const [country, setCountry] = useState(COUNTRIES[0]);
  const [agreed, setAgreed] = useState(false);
  const [identity, setIdentity] = useState(null);

  const stepIndex = step === "details" ? 0 : step === "verify" ? 1 : 2;

  const onDetails = (id) => { setIdentity(id); setStep("verify"); };
  const onVerify = () => { setStep("done"); };

  return (
    <div className="page" data-screen-label={`signup-${step}`}>
      <Hero stepIndex={stepIndex} />
      <div className="form-side">
        <div className="form-top">
          <div className="top-mark"><LogoLumen /></div>
          <span>Already have an account? <a href="#">Sign in</a></span>
        </div>
        <div className="form-wrap">
          {step === "details" && (
            <DetailsStep
              name={name} setName={setName}
              value={value} setValue={setValue}
              country={country} setCountry={setCountry}
              agreed={agreed} setAgreed={setAgreed}
              onSubmit={onDetails}
            />
          )}
          {step === "verify" && identity && (
            <VerifyStep identity={identity} onBack={() => setStep("details")} onVerify={onVerify} />
          )}
          {step === "done" && identity && <SuccessStep identity={identity} />}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
